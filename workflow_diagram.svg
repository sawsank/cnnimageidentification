<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="20"/>
  
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Connectors (Arrows) -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M140 200 H180" marker-end="url(#arrowhead)"/>
    <path d="M300 200 H340" marker-end="url(#arrowhead)"/>
    <path d="M460 200 H500" marker-end="url(#arrowhead)"/>
    <path d="M620 200 H660" marker-end="url(#arrowhead)"/>
  </g>
  
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
  </marker>

  <!-- Nodes -->
  <!-- 1. Input -->
  <g transform="translate(40, 160)" filter="url(#shadow)">
    <rect width="100" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="35" fill="#fff" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">IMAGE</text>
    <text x="50" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">INPUT</text>
  </g>

  <!-- 2. CNN -->
  <g transform="translate(200, 160)" filter="url(#shadow)">
    <rect width="100" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="35" fill="#fff" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">CNN</text>
    <text x="50" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">ENCODER</text>
  </g>

  <!-- 3. Embeddings -->
  <g transform="translate(360, 160)" filter="url(#shadow)">
    <rect width="100" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="35" fill="#fff" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">BIOMETRIC</text>
    <text x="50" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">VECTORS</text>
  </g>

  <!-- 4. Matching -->
  <g transform="translate(520, 160)" filter="url(#shadow)">
    <rect width="100" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="35" fill="#fff" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">COSINE</text>
    <text x="50" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">SIMILARITY</text>
  </g>

  <!-- 5. Result -->
  <g transform="translate(680, 160)" filter="url(#shadow)">
    <rect width="100" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="50" y="35" fill="#fff" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">VERIFIED</text>
    <text x="50" y="55" fill="#4ade80" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">IDENTITY</text>
  </g>

  <!-- Title -->
  <text x="400" y="60" fill="url(#grad1)" font-family="Inter, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Neural Recognition Pipeline</text>
  <text x="400" y="90" fill="#94a3b8" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">DeepFace Architecture Workflow</text>
</svg>
